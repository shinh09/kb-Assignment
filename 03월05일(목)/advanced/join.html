<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <p>
          <label for="id">사용자 ID</label>
          <input type="text" id="id" />
        </p>
        <p>
          <label for="pw">비밀번호</label>
          <input type="password" name="pw" id="pw" />
        </p>
        <p>
          <label for="check">비밀번호 확인</label>
          <input type="password" name="check" id="check" />
        </p>
        <p>
          <label for="name">이름</label>
          <input type="text" id="name" />
        </p>
        <p>
          성별
          <input type="radio" name="gender" id="m" />
          <label for="m">남</label>
          <input type="radio" name="gender" id="w" />
          <label for="w">여</label>
        </p>
        <p>
          취미
          <input type="checkbox" name="hobby" id="s" />
          <label for="s">축구</label>
          <input type="checkbox" name="hobby" id="b" />
          <label for="b">야구</label>
          <input type="checkbox" name="hobby" id="v" />
          <label for="v">배구</label>
          <input type="checkbox" name="hobby" id="k" />
          <label for="k">농구</label>
        </p>
        <p>
          email
          <input type="email" name="email" />
        </p>
        <p>
          역할
          <select>
            <option value="ADMIN">ADMIN</option>
            <option value="관리자">관리자</option>
            <option value="일반회원">일반회원</option>
          </select>
        </p>
        <button type="submit">확인</button>
        <button type="reset">다시쓰기</button>
      </fieldset>
    </form>
  </body>
</html>
