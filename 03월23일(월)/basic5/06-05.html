<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
      }
      .staticBorder {
        border: khaki dashed 5px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button class="staticBorder" :class="myColor">테스트버튼</button>
      <script src="https://unpkg.com/vue"></script>
      <script>
        var vm = Vue.createApp({
          name: 'App',
          data() {
            return {
              myColor: 'buttonLayout buttonColor staticBorder',
            };
          },
        }).mount('#app');
      </script>
    </div>
  </body>
</html>
