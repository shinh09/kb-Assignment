<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        const foods = document.querySelectorAll('input[name="food"]');
        const btn = document.getElementById('btn ');
        btn.onclick = function () {
          for (let food of foods) {
            if (food.checked == true) {
              console.log(food.value);
            }
          }
        };
      };
    </script>
  </head>
  <body>
    <form>
      <div>
        좋아하는 음식은
        <label><input type="checkbox" name="food" value="라면 " /> </label>

        <label><input type="checkbox" name="food" value="만두" /> </label>
        <label><input type="checkbox" name="food" value="불고기 " /> </label>

        <input id="btn " type="button" value="전송" />
      </div>
    </form>
  </body>
</html>
